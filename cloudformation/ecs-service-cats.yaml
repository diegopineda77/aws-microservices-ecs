{
  "AWSTemplateFormatVersion": "2010-09-09",
  "Description": "The template used to create an ECS Service from the ECS Console.",
  "Parameters": {
    "ECSClusterName": {
      "Type": "String",
      "Default": "ECS-proj1"
    },
    "ECSServiceName": {
      "Type": "String",
      "Default": "cats"
    },
    "SecurityGroupIDs": {
      "Type": "CommaDelimitedList",
      "Default": "sg-0b1fad6785b8a48c8"
    },
    "SubnetIDs": {
      "Type": "CommaDelimitedList",
      "Default": ""
    },
    "VpcID": {
      "Type": "String",
      "Default": "vpc-0ab12957ddec31cc3"
    },
    "LoadBalancerName": {
      "Type": "String",
      "Default": "ecs-webcatdog"
    }
  },
  "Resources": {
    "ECSService": {
      "Type": "AWS::ECS::Service",
      "Properties": {
        "Cluster": "ECS-proj1",
        "TaskDefinition": "arn:aws:ecs:us-east-1:427778498090:task-definition/catsdef:1",
        "LaunchType": "EC2",
        "ServiceName": "cats",
        "SchedulingStrategy": "REPLICA",
        "DesiredCount": 2,
        "AvailabilityZoneRebalancing": "ENABLED",
        "LoadBalancers": [
          {
            "ContainerName": "cats",
            "ContainerPort": 80,
            "LoadBalancerName": {
              "Ref": "AWS::NoValue"
            },
            "TargetGroupArn": {
              "Ref": "TargetGroup"
            }
          }
        ],
        "DeploymentConfiguration": {
          "DeploymentCircuitBreaker": {
            "Enable": true,
            "Rollback": true
          },
          "Strategy": "ROLLING",
          "MaximumPercent": 200,
          "MinimumHealthyPercent": 100
        },
        "DeploymentController": {
          "Type": "ECS"
        },
        "ServiceConnectConfiguration": {
          "Enabled": false
        },
        "PlacementStrategies": [
          {
            "Field": "attribute:ecs.availability-zone",
            "Type": "spread"
          },
          {
            "Field": "instanceId",
            "Type": "spread"
          }
        ],
        "PlacementConstraints": [],
        "Tags": [],
        "EnableECSManagedTags": true,
        "EnableExecuteCommand": false
      },
      "DependsOn": [
        "ListenerRule"
      ]
    },
    "TargetGroup": {
      "Type": "AWS::ElasticLoadBalancingV2::TargetGroup",
      "Properties": {
        "HealthCheckPath": "/cats/",
        "Name": "cats",
        "Port": 80,
        "Protocol": "HTTP",
        "TargetType": "instance",
        "HealthCheckProtocol": "HTTP",
        "VpcId": "vpc-0ab12957ddec31cc3",
        "TargetGroupAttributes": [
          {
            "Key": "deregistration_delay.timeout_seconds",
            "Value": "300"
          }
        ]
      }
    },
    "ListenerRule": {
      "Type": "AWS::ElasticLoadBalancingV2::ListenerRule",
      "Properties": {
        "Actions": [
          {
            "Type": "forward",
            "TargetGroupArn": {
              "Ref": "TargetGroup"
            }
          }
        ],
        "Conditions": [
          {
            "Field": "path-pattern",
            "Values": [
              "/cats*"
            ]
          }
        ],
        "ListenerArn": "arn:aws:elasticloadbalancing:us-east-1:427778498090:listener/app/ecs-webcatdog/647fe81f9d4e3da8/682fba623a3c5702",
        "Priority": 1
      }
    }
  },
  "Outputs": {
    "ClusterName": {
      "Description": "The cluster used to create the service.",
      "Value": {
        "Ref": "ECSClusterName"
      }
    },
    "ECSService": {
      "Description": "The created service.",
      "Value": {
        "Ref": "ECSService"
      }
    },
    "TargetGroup": {
      "Description": "The created target group.",
      "Value": {
        "Ref": "TargetGroup"
      }
    },
    "ListenerRule": {
      "Description": "The created listener rule.",
      "Value": {
        "Ref": "ListenerRule"
      }
    }
  }
}